name: secret-scan

# Server-side backstop to the local pre-push hook. Scans the FULL repo history
# on every push/PR with the gitleaks binary directly, rather than the
# gitleaks-action's diff-range mode (before^..after). The action fails on a
# force-push because the pre-rewrite `before` SHA no longer exists
# (`fatal: unknown revision`); a whole-history scan has no such dependency, so
# force-pushes and history rewrites can never produce a false failure.
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1" # weekly sweep, independent of any push

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.30.0"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history

      - name: Install gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "$url" | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full history for secrets
        run: |
          set -euo pipefail
          gitleaks git . \
            --no-banner \
            --redact \
            --config .gitleaks.toml \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif
          echo "No secrets found in repository history."

      - name: Upload findings (only if scan failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
